services:
  - type: worker
    name: rabah-coupons-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: APP_KEY
        sync: false
      - key: APP_SECRET
        sync: false
      - key: TRACKING_ID
        sync: false